<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>296 LIVE TV — Player</title>
  <meta name="description" content="Nonton siaran langsung di 296 LIVE TV." />
  <meta name="theme-color" content="#0a0a12" />
  <meta name="robots" content="noindex" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icons/icon-192.svg" type="image/svg+xml" />

  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://cdn.tailwindcss.com https://cdn.jsdelivr.net 'unsafe-inline';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: https:;
    media-src 'self' https: blob:;
    connect-src 'self' https:;
  " />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { display: ["Sora", "Inter", "sans-serif"], sans: ["Inter", "sans-serif"], mono: ["JetBrains Mono", "monospace"] } } },
    };
  </script>
  <link rel="stylesheet" href="assets/css/style.css" />

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15/dist/hls.min.js" defer></script>
</head>
<body class="font-sans antialiased">
  <a href="#main-content" class="skip-link">Lompat ke konten utama</a>

  <div id="shell-sidebar"></div>
  <div id="shell-header"></div>

  <main id="main-content" class="app-main pt-[68px] px-4 md:px-6 py-6 min-h-screen">
    <div class="mb-4">
      <a href="index.html#/all" class="text-sm text-[color:var(--text-muted)] hover:text-white inline-flex items-center gap-1.5">
        <svg viewBox="0 0 24 24" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg> Kembali
      </a>
    </div>

    <div id="player-mount" class="w-full aspect-video rounded-2xl overflow-hidden glass mb-5 pop-in"></div>

    <div id="channel-info" class="glass rounded-2xl p-5 mb-8"></div>

    <div id="related-channels"></div>
  </main>

  <script type="module" src="assets/js/player-page.js"></script>
</body>
</html>
